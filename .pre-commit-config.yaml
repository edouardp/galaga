repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, -e, SC2016, -e, SC1091]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, -c, .bandit]
        files: ^packages/

  - repo: local
    hooks:
      - id: rumdl
        name: rumdl (markdown lint)
        entry: uvx rumdl check packages/ CHANGELOG.md
        language: system
        types: [markdown]
        pass_filenames: false

      - id: checkmake
        name: Lint Makefile
        entry: checkmake
        language: system
        files: ^Makefile$

[tool.uv.workspace]
members = ["packages/galaga"]
exclude = ["packages/galaga_marimo"]

[dependency-groups]
dev = [
    "galaga",
    "marimo>=0.21.1",
    "matplotlib>=3.10.8",
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "ruff>=0.8.0",
    "pre-commit>=4.0.0",
    "bandit>=1.7.0",
    "pip-audit>=2.0.0",
    "pyrefly>=0.57.1",
]

[tool.uv.sources]
galaga = { workspace = true }

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".git", "__pycache__", ".venv", "dist", "examples"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by line-length)
    "E741",  # ambiguous variable name (we use l, I, etc. in GA)
    "E743",  # ambiguous function name (we have Algebra.I property)
    "E402",  # module-level import not at top — needed for circular imports and test mocking
    "E701",  # multiple statements on one line — used in compact dispatch tables
    "B905",  # zip without strict= (not needed for numpy work)
]

[tool.ruff.lint.isort]
known-first-party = ["galaga", "galaga_marimo"]

[tool.pyrefly]
search-path = ["packages/galaga"]
project-includes = ["packages/galaga/galaga/**/*.py"]
project-excludes = ["**/__pycache__", ".venv"]
